<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPSログで訪れた国を可視化</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Kaisei+Decol:wght@400;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/exifr@7/dist/full.umd.js"></script>
<style>
:root {
  --bg:      #0a0d12;
  --panel:   #12171f;
  --panel2:  #181e28;
  --border:  #252d3a;
  --gold:    #c8951a;
  --gold-lt: #f0b830;
  --text:    #dce6f0;
  --muted:   #6a7a8e;
  --font-h: 'Kaisei Decol', serif;
  --font:   'Noto Sans JP', sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--font);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

/* ヘッダ */
header{
  background:linear-gradient(135deg,#0a0d12 0%,#130e00 100%);
  border-bottom:1px solid var(--gold);padding:10px 18px;
  display:flex;align-items:center;gap:14px;flex-shrink:0;
  box-shadow:0 2px 24px rgba(200,149,26,.18);
}
.logo{font-size:26px;filter:drop-shadow(0 0 8px var(--gold));}
.hd-title{font-family:var(--font-h);font-size:18px;color:var(--gold-lt);letter-spacing:.06em;}
.hd-sub{font-size:10px;color:var(--muted);margin-top:2px;letter-spacing:.1em;}
.hd-stats{margin-left:auto;display:flex;gap:18px;align-items:center;}
.stat{text-align:center;}
.stat-n{font-family:var(--font-h);font-size:22px;color:var(--gold-lt);line-height:1;text-shadow:0 0 14px rgba(200,149,26,.5);}
.stat-l{font-size:10px;color:var(--muted);letter-spacing:.1em;}
.hd-div{width:1px;height:28px;background:var(--border);}

/* レイアウト */
.body{display:flex;flex:1;overflow:hidden;}

/* サイドバー */
aside{width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;}
aside::-webkit-scrollbar{width:3px;}
aside::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.sec{padding:12px 14px;border-bottom:1px solid var(--border);}
.sec-h{font-size:10px;text-transform:uppercase;letter-spacing:.15em;color:var(--muted);margin-bottom:8px;}

/* ドロップゾーン */
.drop{border:2px dashed var(--border);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:all .2s;position:relative;background:rgba(255,255,255,.015);}
.drop:hover,.drop.over{border-color:var(--gold);background:rgba(200,149,26,.07);}
.drop input{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}
.drop .di{font-size:20px;display:block;margin-bottom:4px;}
.drop p{font-size:11px;color:var(--muted);line-height:1.5;}
.drop strong{color:var(--gold-lt);}

/* プログレス */
.prog{display:none;margin-top:8px;}
.prog-track{background:var(--border);border-radius:3px;height:3px;overflow:hidden;}
.prog-fill{background:linear-gradient(90deg,var(--gold),var(--gold-lt));height:100%;width:0;transition:width .2s;border-radius:3px;}
.prog-txt{font-size:10px;color:var(--muted);margin-top:3px;text-align:center;}

/* ボタン */
.btn{width:100%;margin-top:5px;padding:6px 10px;border-radius:6px;font-size:11px;cursor:pointer;font-family:var(--font);transition:all .2s;border:1px solid var(--border);background:transparent;color:var(--muted);}
.btn:hover{border-color:var(--gold);color:var(--gold-lt);}
.btn-danger{border-color:#f8514944;color:#f85149;display:none;}
.btn-danger:hover{background:rgba(248,81,73,.1);border-color:#f85149;}

/* ファイルリスト */
.fl-row{display:flex;align-items:center;gap:7px;padding:4px 2px;border-radius:4px;}
.fl-name{flex:1;font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.fl-name.fl-off{color:var(--muted);text-decoration:line-through;}
.fl-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:11px;padding:2px 4px;border-radius:3px;flex-shrink:0;transition:color .15s;}
.fl-del:hover{color:#f85149;}
.fl-toggle{position:relative;display:inline-block;width:30px;height:16px;flex-shrink:0;}
.fl-toggle input{opacity:0;width:0;height:0;}
.fl-slider{position:absolute;inset:0;background:var(--border);border-radius:8px;transition:.2s;}
.fl-slider::before{content:'';position:absolute;width:12px;height:12px;left:2px;top:2px;background:#6a7a8e;border-radius:50%;transition:.2s;}
.fl-toggle input:checked + .fl-slider{background:var(--gold);}
.fl-toggle input:checked + .fl-slider::before{background:#0a0d12;transform:translateX(14px);}

/* 速度フィルタ */
.speed-radio-group{display:flex;flex-direction:column;gap:4px;margin-top:4px;}
.speed-radio-item{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--muted);cursor:pointer;padding:4px 6px;border-radius:5px;transition:background .15s;}
.speed-radio-item:hover{background:rgba(255,255,255,0.05);}
.speed-radio-item input{accent-color:var(--gold);cursor:pointer;}
.speed-radio-item.active{color:var(--gold-lt);font-weight:700;}

/* 国リストコントロール */
.country-ctrl{display:flex;gap:6px;margin-bottom:6px;}
.country-ctrl .sel{flex:1;font-size:11px;padding:5px 6px;}

/* 国リスト */
.country-list{display:flex;flex-direction:column;gap:2px;padding:4px 0;}
.country-item{display:flex;align-items:center;gap:8px;padding:4px 6px;border-radius:4px;font-size:12px;cursor:pointer;transition:background .12s;}
.country-item:hover{background:rgba(255,255,255,.05);}
.country-flag{font-size:18px;flex-shrink:0;line-height:1;}
.country-name{flex:1;color:var(--text);}
.country-cnt{font-size:10px;color:var(--muted);flex-shrink:0;}
.country-empty{font-size:11px;color:var(--muted);text-align:center;padding:14px 0;line-height:1.8;}
.country-empty span{font-size:24px;display:block;margin-bottom:6px;}

/* トースト */
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(60px);background:var(--panel2);border:1px solid var(--gold);color:var(--text);padding:8px 18px;border-radius:8px;font-size:12px;box-shadow:0 4px 20px rgba(0,0,0,.5);transition:transform .35s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;}
.toast.show{transform:translateX(-50%) translateY(0);}

/* err */
.err{color:#f85149;font-size:11px;margin-top:4px;display:none;}

/* マップ */
#map-wrap{flex:1;position:relative;overflow:hidden;}
#map{width:100%;height:100%;}

/* Leafletカスタム */
.leaflet-container{background:#1a2840 !important;}
.leaflet-popup-content-wrapper{
  background:var(--panel2) !important;
  border:1px solid var(--gold) !important;
  border-radius:8px !important;
  box-shadow:0 4px 20px rgba(0,0,0,.55) !important;
  color:var(--text) !important;
  font-family:var(--font) !important;
}
.leaflet-popup-tip{background:var(--panel2) !important;}
.leaflet-popup-close-button{color:var(--muted) !important;}
.leaflet-popup-close-button:hover{color:var(--gold-lt) !important;}
.popup-date{font-size:11px;color:var(--muted);margin-bottom:4px;}
.popup-name{font-family:var(--font-h);font-size:14px;color:var(--gold-lt);margin-bottom:2px;}
.popup-country{font-size:12px;color:var(--text);}
.popup-loading{font-size:11px;color:var(--muted);font-style:italic;}
.popup-thumb{width:100px;height:100px;object-fit:cover;border-radius:6px;margin-bottom:6px;display:block;}
.fl-controls{display:flex;gap:4px;margin-bottom:4px;}
.fl-ctrl-btn{flex:1;padding:3px 0;font-size:10px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;transition:all .15s;}
.fl-ctrl-btn:hover{border-color:var(--gold);color:var(--gold-lt);}

/* ズームボタン（Leafletのカスタム） */
.leaflet-control-zoom{border:1px solid var(--border) !important;border-radius:6px !important;overflow:hidden;}
.leaflet-control-zoom a{
  background:var(--panel2) !important;
  color:var(--text) !important;
  border-bottom:1px solid var(--border) !important;
  transition:all .15s !important;
}
.leaflet-control-zoom a:hover{background:var(--panel) !important;color:var(--gold-lt) !important;}

/* ローデイング */
#loading-overlay{position:absolute;inset:0;background:rgba(10,13,18,.88);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;z-index:1000;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#load-txt{font-size:12px;color:var(--muted);text-align:center;max-width:260px;line-height:1.6;}

/* プログレスオーバレイ（ファイル処理中） */
#proc-overlay{display:none;position:absolute;inset:0;background:rgba(10,13,18,.6);z-index:500;align-items:center;justify-content:center;flex-direction:column;gap:12px;}
#proc-overlay.show{display:flex;}
</style>
</head>
<body>
<header>
  <span class="logo">🌍</span>

    <div class="hd-title">GPSログで訪れた国を可視化</div>
    <div class="hd-sub">GPSログデータを読み込んで、訪れた国と地点を表示 <span style="color:var(--muted);font-size:9px;">v1.3.8</span></div>

<div class="body">

    <p class="err" id="err"></p>
    <div id="file-list-controls" style="display:none;">
      <div class="fl-controls">
        <button class="fl-ctrl-btn" id="btn-show-all">全て表示</button>
        <button class="fl-ctrl-btn" id="btn-hide-all">全て非表示</button>
      </div>

    <div id="file-list"></div>

    <div style="position:relative;margin-top:5px;">
      <button class="btn" id="btn-import-trigger">📥 インポート（読み込み）</button>

  <div class="sec">

    <div class="speed-radio-group">
      <label class="speed-radio-item" id="speed-lbl-0">
        <input type="radio" name="speed-filter" value="0"> 間引きなし（全点表示）
      </label>
      <label class="speed-radio-item active" id="speed-lbl-30">
        <input type="radio" name="speed-filter" value="30" checked> 車移動を間引き（30km/h以上）
      </label>
      <label class="speed-radio-item" id="speed-lbl-200">
        <input type="radio" name="speed-filter" value="200"> 新幹線・飛行機のみ間引き（200km/h以上）
      </label>
    </div>
    <div style="font-size:10px;color:var(--muted);margin-top:5px;">時刻データのないファイルは間引き対象外</div>

  <div class="sec">
    <div class="sec-h">🌏 訪れた国</div>
    <div class="country-ctrl">
      <select class="sel" id="sort-sel">
        <option value="date">📅 初訪問日順</option>
        <option value="points">📍 記録地点数順</option>
        <option value="ja">［あ］50音順</option>
        <option value="en">［A］アルファベット順</option>
      </select>
      <select class="sel" id="lang-sel">
        <option value="en" selected>English</option>
        <option value="ja">日本語</option>
      </select>
    </div>
    <div id="country-switching" style="display:none;font-size:11px;color:var(--gold-lt);background:rgba(200,149,26,.1);border:1px solid var(--gold);border-radius:6px;padding:6px 10px;margin-bottom:6px;">
      🔄 日本語に切り替え中...
    </div>
    <div id="country-list">
      <div class="country-empty"><span>🌍</span>GPSログデータを読み込むと<br>訪れた国が<br>ここに表示されます</div>
    </div>
  </div>
</aside>

<div id="map-wrap">
  <div id="loading-overlay">
    <div class="spin"></div>
    <p id="load-txt">地図データを読み込み中...<br><small>初回は少し時間がかかります</small></p>
  </div>
  <div id="proc-overlay">
    <div class="spin"></div>
    <p id="proc-txt" style="font-size:12px;color:var(--muted);">処理中...</p>
  </div>
  <div id="map"></div>
</div>
</div>

<div class="toast" id="toast"></div>

<script>
// =====================================================
// 状態
// =====================================================
let map = null;
let geoJsonLayer = null;       // Natural Earth 国ポリゴン
let markersLayer = null;       // 訪問地点マーカ
let countryLayer = null;       // 塗りつぶしレイヤ
let allPoints = [];            // 全ファイル統合の表示用ポイント [{lat,lon,time,fileId}]
let fileList = [];             // {id, name, enabled, rawPoints:[{lat,lon,time}]}
let photoList = [];            // {id, name, lat, lon, time, thumb}
let nextFileId = 1;
let photoMarkersLayer = null;
let speedFilterKmh = 30;       // 間引きしきい値
let visitedCountries = new Map(); // countryCode -> {name, flag, count}
let nominatimCache = new Map();   // "lat,lon" -> {name, country, countryCode}
let countryFillLayer = null;

// =====================================================
// トースト
// =====================================================
function toast(msg, dur=3000) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

// =====================================================
// ハバーサイン
// =====================================================
function haversineKm(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 +
    Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) *
    Math.sin(dLon/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

// =====================================================
// 速度フィルタ＋距離間引き
// =====================================================
function filterPoints(points, maxKmh) {
  if (!points.length) return points;

  // 速度フィルタ（時刻ありの場合）
  let filtered = points;
  const hasTime = points.every(p => p.time);
  if (maxKmh > 0 && hasTime) {
    const speeds = points.map((p, i) => {
      let sp = 0, sn = 0;
      if (i > 0) {
        const prev = points[i-1];
        const dtH = (p.time - prev.time) / 3600000;
        if (dtH > 0) sp = haversineKm(prev.lat, prev.lon, p.lat, p.lon) / dtH;
      }
      if (i < points.length - 1) {
        const next = points[i+1];
        const dtH = (next.time - p.time) / 3600000;
        if (dtH > 0) sn = haversineKm(p.lat, p.lon, next.lat, next.lon) / dtH;
      }
      return Math.max(sp, sn);
    });
    filtered = points.filter((p, i) => speeds[i] < maxKmh);
  }

  // 距離間引き（時刻なし or 間引き後も密すぎる場合）
  // 世界地図なので50m以内は間引く
  const MIN_DIST_KM = 0.05;
  const result = [];
  let lastKept = null;
  for (const p of filtered) {
    if (!lastKept) { result.push(p); lastKept = p; continue; }
    const d = haversineKm(lastKept.lat, lastKept.lon, p.lat, p.lon);
    if (d >= MIN_DIST_KM) { result.push(p); lastKept = p; }
  }
  return result;
}

// =====================================================
// 国コード→旗絵文字
// =====================================================
// OSがサポートしない国旗の直接マッピング
const FLAG_OVERRIDE = {
  'TW': '🇹🇼',
};

function countryCodeToFlag(code) {
  if (!code || code.length !== 2) return '🏳';
  const upper = code.toUpperCase();
  if (FLAG_OVERRIDE[upper]) return FLAG_OVERRIDE[upper];
  return String.fromCodePoint(
    upper.charCodeAt(0) - 65 + 0x1F1E6,
    upper.charCodeAt(1) - 65 + 0x1F1E6
  );
}

// =====================================================
// 言語設定
// =====================================================
let CURRENT_LANG = 'en'; // デフォルトは英語

// Natural EarthのISO_A2が-1になる地域のNAMEから正しいコードに変換
const NAME_TO_ISO2 = {
  'Taiwan': 'TW',
  'Taiwan, Province of China': 'TW',
  'Kosovo': 'XK',
  'N. Cyprus': 'CY',
};

// Natural Earth ne_10mで特殊なISO_A2コードを正規化
const ISO2_NORMALIZE = {
  'CN-TW': 'TW',
};

// =====================================================
// 全国名テーブル（ISO2 → {ja, en}）
// Nominatimに頼らず、このテーブルから国名をとる
// =====================================================
const COUNTRY_NAMES = {

function getCountryName(iso2) {
  if (!iso2) return null;
  const key = iso2.trim().toUpperCase();
  const entry = COUNTRY_NAMES[key];
  if (entry) return entry[CURRENT_LANG] || entry.en || null;
  return null; // テーブルにない→Natural Earthの英語名をつかう
}


// =====================================================
// Nominatim リバスジオコーデイング（キャッシュつき）
// =====================================================
async function reverseGeocode(lat, lon) {
  const key = `${lat.toFixed(4)},${lon.toFixed(4)}`;
  if (nominatimCache.has(key)) return nominatimCache.get(key);

  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json&accept-language=ja`;
    const res = await fetch(url, {headers:{'User-Agent':'GPSVisualizer/1.0'}});
    if (!res.ok) throw new Error('nominatim error');
    const data = await res.json();
    const result = {
      name: data.address?.city || data.address?.town || data.address?.village ||
            data.address?.county || data.address?.state || data.display_name?.split(',')[0] || '',
      country: data.address?.country || '',
      countryCode: (data.address?.country_code || '').toUpperCase()
    };
    nominatimCache.set(key, result);
    return result;
  } catch(e) {
    const result = {name:'', country:'', countryCode:''};
    nominatimCache.set(key, result);
    return result;
  }
}

// =====================================================
// 写真EXIFよみこみ（exifrライブラリ使用）
// =====================================================
async function readPhotoGPS(file) {
  try {
    const gps = await exifr.gps(file);
    if (!gps || gps.latitude == null || gps.longitude == null) return null;
    const exif = await exifr.parse(file, ['DateTimeOriginal', 'CreateDate']);
    const time = exif?.DateTimeOriginal || exif?.CreateDate || null;
    return {
      lat: gps.latitude,
      lon: gps.longitude,
      time: time instanceof Date ? time : null
    };
  } catch(e) {
    return null;
  }
}

// 100×100pxサムネイル生成
function generateThumbnail(file) {
  return new Promise(resolve => {
    const url = URL.createObjectURL(file);
    const img = new Image();
    img.onload = () => {
      const canvas = document.createElement('canvas');
      canvas.width = 100; canvas.height = 100;
      const ctx = canvas.getContext('2d');
      const size = Math.min(img.width, img.height);
      const sx = (img.width - size) / 2;
      const sy = (img.height - size) / 2;
      ctx.drawImage(img, sx, sy, size, size, 0, 0, 100, 100);
      URL.revokeObjectURL(url);
      resolve(canvas.toDataURL('image/jpeg', 0.7));
    };
    img.onerror = () => { URL.revokeObjectURL(url); resolve(null); };
    img.src = url;
  });
}

// 写真マーカ再描画
// 写真てんからくにをじどうはんてい
function detectCountriesFromPhotos() {
  if (!naturalEarthData) return;
  photoList.filter(p => p.enabled !== false).forEach(p => {
    const feature = findCountryForPoint(p.lat, p.lon);
    if (!feature) return;
    const iso2 = getIso2FromFeature(feature);
    if (!iso2 || iso2 === '-1') return;
    const engName = feature.properties?.NAME || feature.properties?.name || iso2;
    const resolved = getCountryName(iso2);
    const countryName = resolved !== null ? resolved : engName;
    if (!visitedCountries.has(iso2)) {
      visitedCountries.set(iso2, {
        name: countryName,
        nameEn: COUNTRY_NAMES[iso2]?.en || engName,
        flag: countryCodeToFlag(iso2),
        countryCode: iso2,
        firstVisit: p.time ? new Date(p.time) : null,
        pointCount: 1
      });
      highlightCountry(iso2);
    } else {
      const entry = visitedCountries.get(iso2);
      if (entry) entry.pointCount++;
    }
  });
  updateCountryList();
  updateStats();
}

function rebuildPhotoMarkers() {
  if (!photoMarkersLayer) return;
  photoMarkersLayer.clearLayers();
  photoList.filter(p => p.enabled !== false).forEach(p => {
    const marker = L.circleMarker([p.lat, p.lon], {
      radius: 6,
      fillColor: '#4caf50',
      fillOpacity: 0.85,
      color: '#2e7d32',
      weight: 1.5
    });
    marker.on('click', async function() {
      const dateStr = p.time
        ? (p.time instanceof Date ? p.time : new Date(p.time))
            .toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'})
        : '日時不明';
      const popup = L.popup({maxWidth:260})
        .setLatLng([p.lat, p.lon])
        .setContent(`
          ${p.thumb ? `<img src="${p.thumb}" class="popup-thumb">` : ''}
          <div class="popup-date">${dateStr}</div>
          <div class="popup-name">${p.name}</div>
          <div class="popup-loading">📍 地名を取得中...</div>
        `)
        .openOn(map);
      const geo = await reverseGeocode(p.lat, p.lon);
      popup.setContent(`
        ${p.thumb ? `<img src="${p.thumb}" class="popup-thumb">` : ''}
        <div class="popup-date">${dateStr}</div>
        <div class="popup-name">${p.name}</div>
        <div class="popup-country">${geo.name ? geo.name + ' / ' : ''}${countryCodeToFlag(geo.countryCode)} ${geo.country || '地名不明'}</div>
      `);
      if (geo.countryCode && !visitedCountries.has(geo.countryCode)) {
        visitedCountries.set(geo.countryCode, {
          name: getCountryName(geo.countryCode) || geo.country,
          nameEn: COUNTRY_NAMES[geo.countryCode]?.en || geo.country,
          flag: countryCodeToFlag(geo.countryCode),
          countryCode: geo.countryCode,
          firstVisit: p.time ? new Date(p.time) : null,
          pointCount: 1
        });
        highlightCountry(geo.countryCode);
        updateCountryList();
        updateStats();
      }
    });
    photoMarkersLayer.addLayer(marker);
  });
  // じどうくにぬりつぶし
  if (naturalEarthData) detectCountriesFromPhotos();
}

// =====================================================
// GPX パーサ
// =====================================================
function parseGPX(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  const points = [];
  // トラックポイント
  doc.querySelectorAll('trkpt').forEach(el => {
    const lat = parseFloat(el.getAttribute('lat'));
    const lon = parseFloat(el.getAttribute('lon'));
    if (isNaN(lat) || isNaN(lon)) return;
    const timeEl = el.querySelector('time');
    const time = timeEl ? new Date(timeEl.textContent) : null;
    points.push({lat, lon, time: time && !isNaN(time) ? time : null});
  });
  return points;
}

// =====================================================
// KML パーサ
// =====================================================
function parseKML(text) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(text, 'text/xml');
  const points = [];
  // Placemark/Point
  doc.querySelectorAll('Placemark').forEach(pm => {
    const coord = pm.querySelector('Point > coordinates');
    if (coord) {
      const parts = coord.textContent.trim().split(',');
      const lon = parseFloat(parts[0]);
      const lat = parseFloat(parts[1]);
      if (!isNaN(lat) && !isNaN(lon)) {
        const timeEl = pm.querySelector('TimeStamp > when') || pm.querySelector('when');
        const time = timeEl ? new Date(timeEl.textContent) : null;
        points.push({lat, lon, time: time && !isNaN(time) ? time : null});
      }
    }
    // LineString内のポイント（トラック）
    const lineCoords = pm.querySelector('LineString > coordinates');
    if (lineCoords) {
      lineCoords.textContent.trim().split(/\s+/).forEach(c => {
        const p = c.split(',');
        const lon = parseFloat(p[0]);
        const lat = parseFloat(p[1]);
        if (!isNaN(lat) && !isNaN(lon)) points.push({lat, lon, time: null});
      });
    }
  });
  // gx:Track
  doc.querySelectorAll('gx\\:Track, Track').forEach(track => {
    const whens = [...track.querySelectorAll('when')];
    const coords = [...track.querySelectorAll('gx\\:coord, coord')];
    coords.forEach((c, i) => {
      const p = c.textContent.trim().split(' ');
      const lon = parseFloat(p[0]);
      const lat = parseFloat(p[1]);
      if (!isNaN(lat) && !isNaN(lon)) {
        const time = whens[i] ? new Date(whens[i].textContent) : null;
        points.push({lat, lon, time: time && !isNaN(time) ? time : null});
      }
    });
  });
  return points;
}

// =====================================================
// Google タイムライン JSON パーサ
// =====================================================
function parseGoogleTimeline(obj) {
  const points = [];

  // semanticSegments 形式
  if (obj.semanticSegments) {
    obj.semanticSegments.forEach(seg => {
      // visit
      if (seg.visit?.topCandidate?.placeLocation?.latLng) {
        const ll = seg.visit.topCandidate.placeLocation.latLng;
        const m = String(ll).match(/([-\d.]+)[°\s,]+([-\d.]+)/);
        if (m) {
          const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
          const time = seg.startTime ? new Date(seg.startTime) : null;
          if (!isNaN(lat) && !isNaN(lon)) points.push({lat, lon, time});
        }
      }
      // timelinePath
      if (seg.timelinePath) {
        seg.timelinePath.forEach(p => {
          const m = String(p.point).match(/([-\d.]+)[°\s,]+([-\d.]+)/);
          if (m) {
            const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
            const time = p.time ? new Date(p.time) : null;
            if (!isNaN(lat) && !isNaN(lon)) points.push({lat, lon, time});
          }
        });
      }
    });
    return points;
  }

  // locations 配列形式（Records.json）
  if (obj.locations) {
    obj.locations.forEach(loc => {
      const lat = (loc.latitudeE7 ?? loc.latitude) / (loc.latitudeE7 !== undefined ? 1e7 : 1);
      const lon = (loc.longitudeE7 ?? loc.longitude) / (loc.longitudeE7 !== undefined ? 1e7 : 1);
      if (!isNaN(lat) && !isNaN(lon)) {
        const time = loc.timestamp ? new Date(loc.timestamp) : null;
        points.push({lat, lon, time});
      }
    });
    return points;
  }

  // 旧形式 placeVisit / activitySegment + location-history.json形式
  if (Array.isArray(obj)) {
    obj.forEach(item => {
      // location-history.json形式 { visit: { topCandidate: { placeLocation: "geo:lat,lon" } } }
      const visit = item.visit;
      if (visit?.topCandidate?.placeLocation) {
        const m = String(visit.topCandidate.placeLocation).match(/geo:([-\d.]+),([-\d.]+)/);
        if (m) {
          const lat = parseFloat(m[1]), lon = parseFloat(m[2]);
          const time = item.startTime ? new Date(item.startTime) : null;
          if (!isNaN(lat) && !isNaN(lon)) points.push({lat, lon, time});
          return;
        }
      }
      // 旧旧形式 placeVisit
      const pv = item.placeVisit;
      if (pv?.location?.latitudeE7) {
        points.push({
          lat: pv.location.latitudeE7 / 1e7,
          lon: pv.location.longitudeE7 / 1e7,
          time: pv.duration?.startTimestamp ? new Date(pv.duration.startTimestamp) : null
        });
      }
    });
    return points;
  }

  return points;
}

// =====================================================
// ファイル処理
// =====================================================
async function processFile(file) {
  const name = file.name;
  const ext = name.split('.').pop().toLowerCase();
  let text;

  try {
    text = await file.text();
  } catch(e) {
    return null;
  }

  let rawPoints = [];

  if (ext === 'jpg' || ext === 'jpeg') {
    const gps = await readPhotoGPS(file);
    if (!gps) return {type:'photo_nogps', name};
    const thumb = await generateThumbnail(file);
    // ひょうじ名: 📷 年月 ファイル名
    let photoDisplayName = name;
    if (gps.time instanceof Date) {
      const yr = gps.time.getFullYear();
      const mo = String(gps.time.getMonth()+1).padStart(2,'0');
      photoDisplayName = `📷 ${yr}-${mo} ${name}`;
    }
    const photo = {id:nextFileId++, name:photoDisplayName, originalName:name, lat:gps.lat, lon:gps.lon, time:gps.time, thumb, enabled:true};
    photoList.push(photo);
    rebuildPhotoMarkers();
    return {type:'photo', name};
  }

  if (ext === 'gpx') {
    rawPoints = parseGPX(text);
  } else if (ext === 'kml') {
    rawPoints = parseKML(text);
  } else if (ext === 'json') {
    try {
      const obj = JSON.parse(text);
      if (obj._worldExport) return {type:'worldimport', data:obj};
      rawPoints = parseGoogleTimeline(obj);
    } catch(e) {
      return null;
    }
  }

  if (!rawPoints.length) return null;

  // ひょうじ名: 最初の日付 + 点数
  const timePts = rawPoints.filter(p => p.time);
  let displayName = name;
  if (timePts.length) {
    timePts.sort((a, b) => a.time - b.time);
    const d = timePts[0].time;
    const dateStr = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    displayName = `${dateStr} (${rawPoints.length}pts)`;
  } else {
    displayName = `${name} (${rawPoints.length}pts)`;
  }

  return {
    id: nextFileId++,
    name: displayName,
    originalName: name,
    enabled: true,
    rawPoints
  };
}

// =====================================================
// ポイントインポリゴン判定（レイキャスト法）
// =====================================================
function pointInPolygon(lat, lon, coords) {
  let inside = false;
  for (let i = 0, j = coords.length - 1; i < coords.length; j = i++) {
    const xi = coords[i][0], yi = coords[i][1];
    const xj = coords[j][0], yj = coords[j][1];
    if (((yi > lat) !== (yj > lat)) && (lon < (xj - xi) * (lat - yi) / (yj - yi) + xi)) {
      inside = !inside;
    }
  }
  return inside;
}

function pointInFeature(lat, lon, feature) {
  const geom = feature.geometry;
  if (!geom) return false;
  const check = (rings) => rings.some(ring => pointInPolygon(lat, lon, ring));
  if (geom.type === 'Polygon') return check(geom.coordinates);
  if (geom.type === 'MultiPolygon') return geom.coordinates.some(poly => check(poly));
  return false;
}

// バウンデイングボックスキャシュ（initCountryLayerでじぜんにけいさん）
let bboxCache = null;

function buildBboxCache(features) {
  bboxCache = features.map(f => {
    const geom = f.geometry;
    if (!geom) return null;
    let minLat=90, maxLat=-90, minLon=180, maxLon=-180;
    function processCoords(coords) {
      if (typeof coords[0] === 'number') {
        if (coords[0] < minLon) minLon = coords[0];
        if (coords[0] > maxLon) maxLon = coords[0];
        if (coords[1] < minLat) minLat = coords[1];
        if (coords[1] > maxLat) maxLat = coords[1];
      } else {
        coords.forEach(processCoords);
      }
    }
    if (geom.coordinates) processCoords(geom.coordinates);
    return {minLat, maxLat, minLon, maxLon};
  });
}

function findCountryForPoint(lat, lon) {
  if (!naturalEarthData || !naturalEarthData.features) return null;
  const features = naturalEarthData.features;
  for (let i = 0; i < features.length; i++) {
    // バウンデイングボックスで事前フィルタ
    if (bboxCache && bboxCache[i]) {
      const b = bboxCache[i];
      if (lat < b.minLat || lat > b.maxLat || lon < b.minLon || lon > b.maxLon) continue;
    }
    if (pointInFeature(lat, lon, features[i])) return features[i];
  }
  return null;
}

// featureからISO2コードを正規化して取得
function getIso2FromFeature(feature) {
  let iso2 = (feature.properties?.ISO_A2 || feature.properties?.iso_a2 || '').toUpperCase();
  // -1の場合はNAMEから変換を試みる
  if (!iso2 || iso2 === '-1') {
    const name = feature.properties?.NAME || feature.properties?.name || '';
    iso2 = NAME_TO_ISO2[name] || '';
  }
  // ne_10mの特殊コードを正規化（CN-TW→TW等）
  if (ISO2_NORMALIZE[iso2]) iso2 = ISO2_NORMALIZE[iso2];
  return iso2;
}

// =====================================================
// 国ぬりつぶし自動判定（バッチ処理）
// =====================================================
let detectBatchTimer = null;

// 国コードごとのNominatim国名取得キャッシュ
const countryNameCache = new Map();

let nominatimLang = 'en';

async function fetchCountryName(iso2, sampleLat, sampleLon) {
  if (countryNameCache.has(iso2)) return countryNameCache.get(iso2);
  try {
    const url = `https://nominatim.openstreetmap.org/reverse?lat=${sampleLat}&lon=${sampleLon}&format=json&accept-language=${nominatimLang}&zoom=3`;
    const res = await fetch(url, {headers:{'User-Agent':'GPSVisualizer/1.0'}});
    if (!res.ok) throw new Error();
    const data = await res.json();
    const name = data.address?.country || '';
    countryNameCache.set(iso2, name);
    return name;
  } catch(e) {
    countryNameCache.set(iso2, '');
    return '';
  }
}

function detectCountriesFromPoints(displayPoints) {
  if (!naturalEarthData || !naturalEarthData.features) return;

  // くにごとに「かならず1てんいじょうあたる」しくみ
  // ぜんてんをなめて、みつかたくにはすぐ登録、以降そのくにはスキップ
  // → くにごとにポリゴンはんてい1かいだけ、かるい！
  const foundCodes = new Set();
  const codeSamplePoint = new Map();
  let idx = 0;
  const BATCH = 500; // くにみつかたらすぐスキップするからおおきくてもOK

  function runBatch() {
    const end = Math.min(idx + BATCH, displayPoints.length);
    for (; idx < end; idx++) {
      const p = displayPoints[idx];
      const feature = findCountryForPoint(p.lat, p.lon);
      if (!feature) continue;
      const iso2 = getIso2FromFeature(feature);
      if (!iso2 || iso2 === '-1') continue;
      const engName = feature.properties?.NAME || feature.properties?.name || iso2;
      const resolved = getCountryName(iso2);
      const countryName = resolved !== null ? resolved : engName;

      if (!foundCodes.has(iso2)) {
        // はじめてみつかたくに → 登録してハイライト
        foundCodes.add(iso2);
        codeSamplePoint.set(iso2, p);
        visitedCountries.set(iso2, {
          name: countryName,
          nameEn: (COUNTRY_NAMES[iso2]?.en) || engName,
          flag: countryCodeToFlag(iso2),
          countryCode: iso2,
          firstVisit: p.time || null,
          pointCount: 1
        });
        highlightCountry(iso2);
      } else {
        // すでにみつかたくに → pointCountとfirstVisitだけ更新
        const entry = visitedCountries.get(iso2);
        if (entry) {
          entry.pointCount = (entry.pointCount || 0) + 1;
          if (p.time && (!entry.firstVisit || p.time < entry.firstVisit)) {
            entry.firstVisit = p.time;
          }
        }
      }
    }
    updateCountryList();
    updateStats();
    if (idx < displayPoints.length) {
      setTimeout(runBatch, 0);
    } else {
      resolveCountryNames(codeSamplePoint);
      // GPSてんのバッチかんりょうごにしゃしんてんのくにもはんてい
      if (naturalEarthData && photoList.length > 0) detectCountriesFromPhotos();
    }
  }
  runBatch();
}

// 国名はCOUNTRY_NAMESテーブルからとるのでNominatim不要
// この関数はテーブルにない国だけフォールバックとして残す
function resolveCountryNames(codeSamplePoint) {
  // テーブルにない国はnameEnをそのままつかう（すでに登録済み）
  updateCountryList();
}

// =====================================================
// マーカ再描画
// =====================================================
function rebuildMarkers() {
  if (!markersLayer) return;
  markersLayer.clearLayers();
  visitedCountries.clear();

  // 国の塗りつぶしをリセット
  if (countryFillLayer && naturalEarthData && naturalEarthData.type !== 'Topology') {
    countryFillLayer.eachLayer(group => {
      if (group.setStyle) group.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5});
      else if (group.eachLayer) group.eachLayer(l => { if (l.setStyle) l.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5}); });
    });
  }

  // 全有効ファイルのポイントを統合・間引き
  let displayPoints = [];
  fileList.forEach(f => {
    if (!f.enabled) return;
    const filtered = filterPoints(f.rawPoints, speedFilterKmh);
    filtered.forEach(p => displayPoints.push({...p, fileId: f.id}));
  });

  // 表示上限
  const MAX_DISPLAY = 50000;
  if (displayPoints.length > MAX_DISPLAY) {
    const step = Math.ceil(displayPoints.length / MAX_DISPLAY);
    displayPoints = displayPoints.filter((_, i) => i % step === 0);
  }

  displayPoints.forEach(p => {
    const circleMarker = L.circleMarker([p.lat, p.lon], {
      radius: 4,
      fillColor: '#f0b830',
      fillOpacity: 0.7,
      color: '#c8951a',
      weight: 1
    });

    // ポップアップ（クリック時にNominatim呼び出し）
    circleMarker.on('click', async function() {
      const dateStr = p.time
        ? p.time.toLocaleDateString('ja-JP', {year:'numeric', month:'long', day:'numeric'})
        : '日時不明';

      const popup = L.popup({maxWidth: 240, className:'world-popup'})
        .setLatLng([p.lat, p.lon])
        .setContent(`
          <div class="popup-date">${dateStr}</div>
          <div class="popup-loading">📍 地名を取得中...</div>
        `)
        .openOn(map);

      const geo = await reverseGeocode(p.lat, p.lon);
      popup.setContent(`
        <div class="popup-date">${dateStr}</div>
        <div class="popup-name">${geo.name || '地名不明'}</div>
        <div class="popup-country">${countryCodeToFlag(geo.countryCode)} ${geo.country || ''}</div>
      `);

      // ポップアップからも国登録（ポリゴンにない小さい島など対応）
      if (geo.countryCode && !visitedCountries.has(geo.countryCode)) {
        visitedCountries.set(geo.countryCode, {
          name: geo.country,
          flag: countryCodeToFlag(geo.countryCode),
          countryCode: geo.countryCode,
          firstVisit: p.time || null
        });
        updateCountryList();
        updateStats();
        highlightCountry(geo.countryCode);
      }
    });

    markersLayer.addLayer(circleMarker);
  });

  document.getElementById('s-points').textContent = displayPoints.length.toLocaleString();

  // 国ポリゴン自動判定（バッチ）
  if (detectBatchTimer) clearTimeout(detectBatchTimer);
  if (displayPoints.length > 0) {
    detectBatchTimer = setTimeout(() => {
      detectCountriesFromPoints(displayPoints);
    }, 200);
  } else {
    // GPSてんがなくてもしゃしんてんのくにはひょうじ
    if (naturalEarthData && photoList.length > 0) detectCountriesFromPhotos();
  }
}

// =====================================================
// 国リスト更新
// =====================================================
function updateCountryList() {
  const el = document.getElementById('country-list');
  if (!visitedCountries.size) {
    el.innerHTML = '<div class="country-empty"><span>🌍</span>GPSログデータを読み込むと<br>訪れた国が<br>ここに表示されます</div>';
    return;
  }

  const vals = [...visitedCountries.values()];
  const sorted = vals.sort((a, b) => {
    if (currentSort === 'date') {
      if (!a.firstVisit && !b.firstVisit) return (a.name||'').localeCompare(b.name||'','ja');
      if (!a.firstVisit) return 1;
      if (!b.firstVisit) return -1;
      return a.firstVisit - b.firstVisit;
    } else if (currentSort === 'points') {
      return (b.pointCount||0) - (a.pointCount||0);
    } else if (currentSort === 'ja') {
      return (a.name||'').localeCompare(b.name||'','ja');
    } else { // en
      return (a.nameEn||a.name||'').localeCompare(b.nameEn||b.name||'','en');
    }
  });

  el.innerHTML = `<div class="country-list">${
    sorted.map(c => `
      <div class="country-item" data-code="${c.countryCode}">
        <span class="country-flag">${c.flag}</span>
        <span class="country-name">${c.name || c.countryCode}</span>
      </div>
    `).join('')
  }</div>`;
}

}

// =====================================================
// 国塗りつぶし（Natural Earthポリゴン）
// =====================================================
let naturalEarthData = null;

async function loadNaturalEarth() {
  // ne_10m: もっとも細かいポリゴン（沖縄など離島も含む）
  const URLS = [
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_10m_admin_0_countries.geojson',
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_50m_admin_0_countries.geojson',
    'https://raw.githubusercontent.com/nvkelso/natural-earth-vector/master/geojson/ne_110m_admin_0_countries.geojson',
  ];

  for (const url of URLS) {
    try {
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      return data;
    } catch(e) {
      console.warn('failed:', url);
    }
  }
  return null;
}

function initCountryLayer(data) {
  if (!data) return;
  naturalEarthData = data;

  if (data.type === 'Topology') return;

  // バウンデイングボックスをじぜんにけいさんしてキャシュ
  buildBboxCache(data.features);

  // GeoJSONを-360, 0, +360の3コピーで描画（横スクロール時にきえないように）
  function makeShiftedData(geojson, shiftLon) {
    return {
      type: 'FeatureCollection',
      features: geojson.features.map(f => {
        const shifted = JSON.parse(JSON.stringify(f));
        function shiftCoords(c) {
          if (typeof c[0] === 'number') return [c[0] + shiftLon, c[1]];
          return c.map(shiftCoords);
        }
        if (shifted.geometry?.coordinates) {
          shifted.geometry.coordinates = shifted.geometry.coordinates.map(shiftCoords);
        }
        return shifted;
      })
    };
  }

  const baseStyle = {fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5};

  countryFillLayer = L.layerGroup();
  [-360, 0, 360].forEach(shift => {
    const geoData = shift === 0 ? data : makeShiftedData(data, shift);
    const layer = L.geoJSON(geoData, {
      style: () => baseStyle,
      onEachFeature: (feature, layer) => {
        if (shift !== 0) return;
        const name = feature.properties?.NAME || feature.properties?.name || '';
        layer.bindTooltip(name, {sticky:true, className:'country-tooltip', direction:'top'});
      }
    });
    countryFillLayer.addLayer(layer);
  });
  countryFillLayer.addTo(map);

  // マーカレイヤをポリゴンの上に
  markersLayer.addTo(map);
}

function highlightCountry(countryCode) {
  if (!countryFillLayer || !countryCode) return;
  countryFillLayer.eachLayer(group => {
    if (group.eachLayer) {
      group.eachLayer(layer => {
        const props = layer.feature?.properties || {};
        const iso2 = getIso2FromFeature({properties: props});
        if (iso2 === countryCode.toUpperCase()) {
          layer.setStyle({fillColor:'#c8951a', fillOpacity:0.5, color:'#f0b830', weight:1});
        }
      });
    }
  });
}

// =====================================================
// ファイルリストUI更新
// =====================================================
function renderFileList() {
  const el = document.getElementById('file-list');
  const clearBtn = document.getElementById('btn-clear');
  const ctrlEl = document.getElementById('file-list-controls');
  const hasAny = fileList.length > 0 || photoList.length > 0;

  if (!hasAny) {
    el.innerHTML = '';
    clearBtn.style.display = 'none';
    if (ctrlEl) ctrlEl.style.display = 'none';
    return;
  }
  clearBtn.style.display = 'block';
  if (ctrlEl) ctrlEl.style.display = 'block';

  const gpsRows = fileList.map(f => `
    <div class="fl-row" data-id="${f.id}">
      <label class="fl-toggle">
        <input type="checkbox" ${f.enabled ? 'checked' : ''} data-toggle="${f.id}">
        <span class="fl-slider"></span>
      </label>
      <span class="fl-name ${f.enabled ? '' : 'fl-off'}" title="${f.name}">${f.name}</span>
      <button class="fl-del" data-del="${f.id}">✕</button>
    </div>
  `).join('');

  const photoRows = photoList.map(p => `
    <div class="fl-row" data-photo-id="${p.id}">
      <label class="fl-toggle">
        <input type="checkbox" ${p.enabled !== false ? 'checked' : ''} data-photo-toggle="${p.id}">
        <span class="fl-slider"></span>
      </label>
      <span class="fl-name ${p.enabled !== false ? '' : 'fl-off'}" title="${p.name}">${p.name}</span>
      <button class="fl-del" data-photo-del="${p.id}">✕</button>
    </div>
  `).join('');

  el.innerHTML = gpsRows + photoRows;

  el.querySelectorAll('[data-toggle]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = parseInt(cb.dataset.toggle);
      const f = fileList.find(x => x.id === id);
      if (f) { f.enabled = cb.checked; rebuildMarkers(); }
      const nameEl = cb.closest('.fl-row').querySelector('.fl-name');
      nameEl.classList.toggle('fl-off', !cb.checked);
    });
  });

  el.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.del);
      fileList = fileList.filter(x => x.id !== id);
      renderFileList();
      rebuildMarkers();
    });
  });

  el.querySelectorAll('[data-photo-toggle]').forEach(cb => {
    cb.addEventListener('change', () => {
      const id = parseInt(cb.dataset.photoToggle);
      const p = photoList.find(x => x.id === id);
      if (p) {
        p.enabled = cb.checked;
        // くにのぬりつぶしをリセットしてGPSてん＋しゃしんてんから再計算
        visitedCountries.clear();
        if (countryFillLayer && naturalEarthData) {
          countryFillLayer.eachLayer(group => {
            if (group.setStyle) group.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5});
            else if (group.eachLayer) group.eachLayer(l => { if (l.setStyle) l.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5}); });
          });
        }
        rebuildMarkers();
        rebuildPhotoMarkers();
      }
      const nameEl = cb.closest('.fl-row').querySelector('.fl-name');
      nameEl.classList.toggle('fl-off', !cb.checked);
    });
  });

  el.querySelectorAll('[data-photo-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = parseInt(btn.dataset.photoDel);
      photoList = photoList.filter(x => x.id !== id);
      renderFileList();
      // くにのぬりつぶしをリセットして再計算
      visitedCountries.clear();
      if (countryFillLayer && naturalEarthData) {
        countryFillLayer.eachLayer(group => {
          if (group.setStyle) group.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5});
          else if (group.eachLayer) group.eachLayer(l => { if (l.setStyle) l.setStyle({fillColor:'#1a3a5c', fillOpacity:0.35, color:'#2a5080', weight:0.5}); });
        });
      }
      rebuildMarkers();
      rebuildPhotoMarkers();
    });
  });
}

// =====================================================
// ファイル読み込みハンドラ
// =====================================================
async function handleFiles(files) {
  const procOverlay = document.getElementById('proc-overlay');
  const procTxt     = document.getElementById('proc-txt');
  const prog        = document.getElementById('prog');
  const progFill    = document.getElementById('prog-fill');
  const progTxt     = document.getElementById('prog-txt');
  const errEl       = document.getElementById('err');

  errEl.style.display = 'none';
  prog.style.display = 'block';
  procOverlay.classList.add('show');

  let loaded = 0;
  for (const file of files) {
    procTxt.textContent = `処理中: ${file.name}`;
    progTxt.textContent = `${file.name} を処理中...`;
    const result = await processFile(file);
    loaded++;
    progFill.style.width = `${(loaded / files.length) * 100}%`;

    if (result) {
      if (result.type === 'photo') {
        // 写真はphotoListにはいってる
      } else if (result.type === 'photo_nogps') {
        errEl.textContent = `${file.name}: GPS情報がありません`;
        errEl.style.display = 'block';
      } else if (result.type === 'worldimport') {
        importWorldData(result.data);
      } else {
        fileList.push(result);
      }
    } else {
      errEl.textContent = `${file.name}: 読み込み失敗（対応フォーマットを確認してください）`;
      errEl.style.display = 'block';
    }
  }

  prog.style.display = 'none';
  procOverlay.classList.remove('show');
  renderFileList();
  rebuildMarkers();

  const total = fileList.reduce((s, f) => s + f.rawPoints.length, 0);
  toast(`${files.length}ファイル読み込み完了（元データ ${total.toLocaleString()}点）`);
}

function initMap() {
  map = L.map('map', {
    center: [30, 10],
    zoom: 3,
    zoomControl: true,
    worldCopyJump: false
  });

  // タイルレイヤ（ダクテマ）
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
    subdomains: 'abcd',
    maxZoom: 19
  }).addTo(map);

  // マーカレイヤ

      markersLayer.addTo(map);
      toast('地図データ（国境線）の読み込みに失敗しました。地点は表示できます。');
    }
  });
}

// =====================================================
// インポート
// =====================================================
function importWorldData(data) {
  if (!data._worldExport) return;
  if (data.files) {
    data.files.forEach(f => {
      fileList.push({
        id: nextFileId++, name: f.name, enabled: f.enabled,
        rawPoints: f.rawPoints.map(p => ({
          lat: p.lat, lon: p.lon,
          time: p.time ? new Date(p.time) : null
        }))
      });
    });
  }
  if (data.photos) {
    data.photos.forEach(p => {
      photoList.push({
        id: nextFileId++, name: p.name,
        lat: p.lat, lon: p.lon,
        time: p.time ? new Date(p.time) : null,
        thumb: p.thumb
      });
    });
  }
  renderFileList();
  rebuildMarkers();
  rebuildPhotoMarkers();
  toast('インポートしました！');
}

document.getElementById('importIn').addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  try {
    const text = await file.text();
    const obj = JSON.parse(text);
    if (obj._worldExport) {
      importWorldData(obj);
    } else {
      toast('このファイルは世界版のエクスポートデータではありません');
    }
  } catch(err) {
    toast('読み込みに失敗しました');
  }
  e.target.value = '';
});

// =====================================================
// 全表示・全非表示
// =====================================================
document.getElementById('btn-show-all').addEventListener('click', () => {
  fileList.forEach(f => f.enabled = true);
  renderFileList();
  rebuildMarkers();
});

document.getElementById('btn-hide-all').addEventListener('click', () => {
  fileList.forEach(f => f.enabled = false);
  renderFileList();
  rebuildMarkers();
});

// =====================================================
// ソート＆言語セレクタ
// =====================================================
let currentSort = 'date';

document.getElementById('sort-sel').addEventListener('change', e => {
  currentSort = e.target.value;
  updateCountryList();
});

document.getElementById('lang-sel').addEventListener('change', e => {
  const newLang = e.target.value;
  if (newLang === CURRENT_LANG) return;

  CURRENT_LANG = newLang;
  nominatimLang = newLang;
  nominatimCache.clear();

  // COUNTRY_NAMESテーブルから国名をきりかえるだけ、すぐおわる
  for (const [iso2, entry] of visitedCountries.entries()) {
    const resolved = getCountryName(iso2);
    entry.name = resolved !== null ? resolved : (entry.nameEn || entry.name);
  }

  // 50音順optionのグレーアウト
  const jaOpt = document.querySelector('#sort-sel option[value="ja"]');
  if (jaOpt) jaOpt.disabled = (newLang !== 'ja');
  // 英語モードで50音順が選ばれてたらアルファベット順にきりかえ
  if (newLang !== 'ja' && currentSort === 'ja') {
    currentSort = 'en';
    document.getElementById('sort-sel').value = 'en';
  }

  updateCountryList();
});

// =====================================================
// 起動
// =====================================================
// 初期状態：英語モードなので50音順をグレーアウト
document.addEventListener('DOMContentLoaded', () => {
  const jaOpt = document.querySelector('#sort-sel option[value="ja"]');
  if (jaOpt) jaOpt.disabled = true;
});

initMap();
</script>
</body>
</html>
